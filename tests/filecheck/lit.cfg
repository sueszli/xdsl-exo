import lit.formats
import os
import platform

config.test_source_root = os.path.dirname(__file__)
exo_src = os.path.dirname(os.path.dirname(config.test_source_root))

config.name = "exo-mlir"
config.test_format = lit.formats.ShTest(preamble_commands=[f"cd {exo_src}"])
config.suffixes = [".py"]

# resolve "uv run exojit" to the venv entry point so lit doesn't depend on asdf shims
config.substitutions.append(("uv run exojit", os.path.join(exo_src, ".venv", "bin", "exojit")))
