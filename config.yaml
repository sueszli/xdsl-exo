# compiler configuration
cc: clang
cxx: clang++
cflags: -std=c17 -O3 -Wall -Wextra
cxxflags: -std=c++17 -O3 -Wall -Wextra
ldflags: -lm

levels:
    level1:
        - asum
        - axpy
        - dot
        - exo_copy
        - rot
        - scal

opt: opt
mlir-opt: mlir-opt
mlir-translate: mlir-translate
